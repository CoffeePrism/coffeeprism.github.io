[outputs]
home = ["HTML", "RSS", "JSON"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[pagination]
  # 24/页：727 篇文章从 73 个近重复分页页降到 ~31 个，降低旧文章点击深度
  pagerSize = 24

# RSS：限 50 条 + 全文输出（layouts/rss.xml）。全文 feed 是 AI 引擎
# 摄取内容的低成本通道；全量 727 条 summary-only 的 782KB feed 没人消费。
[services.rss]
  limit = 50
