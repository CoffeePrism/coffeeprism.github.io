baseURL = "https://www.coffeeprism.com/"
languageCode = "zh-cn"
title = "Coffee Prism"
theme = "Mainroad"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# 中文摘要：Hugo 默认按英文单词 split，中文没空格会把整篇当作 1 个单词。
# 启用 CJK 让 .Summary 按字符截断。
hasCJKLanguage = true
summaryLength = 80

[minify]
  disableXML = true
  minifyOutput = true

[Author]
  name = "Coffee Prism"
  bio = "专业的咖啡爱好者网站，提供咖啡豆介绍、冲泡方式和咖啡装备评测"

[Params]
  description = "专业的咖啡爱好者网站，提供咖啡豆介绍、冲泡方式和咖啡装备评测"
  copyright = "Coffee Prism"
  readmore = true
  authorbox = true
  toc = true
  pager = true
  post_meta = ["author", "date", "categories", "tags"]
  mainSections = ["posts"]
  dateformat = "2006-01-02"
  opengraph = true
  schema = true
  twitter_cards = true

  customCSS = ["/css/custom.css"]

  # Cloudflare Worker that verifies Stripe sessions and signs PDF download URLs.
  # After running `wrangler deploy` in worker/, update this to your workers.dev URL
  # (or your custom subdomain like https://api.coffeeprism.com).
  fulfillmentWorkerUrl = "https://coffeeprism-fulfillment.ikow233.workers.dev"

  # ConvertKit email capture (tag-based subscription)
  convertKitApiKey = "xq6f1Lkl52EuZgWihSR3Mw"
  convertKitTagId = "20668699"

  [Params.style.vars]

  [Params.logo]
    title = "Coffee Prism"
    subtitle = "您的咖啡专业指南"

  [Params.thumbnail]
    visibility = ["list", "post"]

  [Params.sidebar]
    # 全站无 sidebar：首页用 hero + pillar 卡片 + book 卡片代替；
    # 文章/pillar 页用 sticky TOC 代替；分类页用 card grid。
    home = false
    list = false
    single = false
    widgets = ["search", "recent", "categories", "social"]

  [Params.widgets]
    recent_num = 5
    categories_counter = true
    tags_counter = true

  [Params.widgets.social]

# 主导航按用户「意图」排，5 项不杂
[[menu.main]]
identifier = "brewing-methods"
name = "冲煮方法"
url = "/brewing-methods/"
weight = 10

[[menu.main]]
identifier = "coffee-beans"
name = "咖啡豆"
url = "/coffee-beans/"
weight = 20

[[menu.main]]
identifier = "coffee-equipment"
name = "咖啡器具"
url = "/coffee-equipment/"
weight = 30

[[menu.main]]
identifier = "health"
name = "咖啡与健康"
url = "/health/"
weight = 40

[[menu.main]]
identifier = "guides"
name = "📘 电子书"
url = "/guide/comprehensive/"
weight = 50

# 把次要入口放底部菜单（footer 渲染），保留可访问性但不挤占主导航
[[menu.footer]]
identifier = "trending"
name = "热点分析"
url = "/categories/咖啡热点分析/"
weight = 10

[[menu.footer]]
identifier = "categories"
name = "全部分类"
url = "/categories/"
weight = 20

[[menu.footer]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 30

[[menu.footer]]
identifier = "about"
name = "关于我们"
url = "/about/"
weight = 40

[[menu.footer]]
identifier = "contact"
name = "联系我们"
url = "/contact/"
weight = 70

[outputs]
home = ["HTML", "RSS", "JSON"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[pagination]
  pagerSize = 10
