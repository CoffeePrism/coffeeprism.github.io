baseURL = "https://www.coffeeprism.com/"
languageCode = "zh-cn"
# 不设 defaultContentLanguage 时 Hugo 语言 key 是 "en"，导致 <html lang=en>
# —— 中文站声明成英文会误导搜索引擎和 AI 检索器
defaultContentLanguage = "zh-cn"
title = "Coffee Prism"
theme = "Mainroad"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# 中文摘要：Hugo 默认按英文单词 split，中文没空格会把整篇当作 1 个单词。
# 启用 CJK 让 .Summary 按字符截断。
hasCJKLanguage = true
summaryLength = 80

[minify]
  disableXML = true
  minifyOutput = true

[Author]
  name = "Coffee Prism"
  bio = "专业的咖啡爱好者网站，提供咖啡豆介绍、冲泡方式和咖啡装备评测"

[Params]
  description = "专业的咖啡爱好者网站，提供咖啡豆介绍、冲泡方式和咖啡装备评测"
  copyright = "Coffee Prism"
  readmore = true
  authorbox = true
  toc = true
  pager = true
  post_meta = ["author", "date", "categories", "tags"]
  mainSections = ["posts"]
  dateformat = "2006-01-02"
  opengraph = true
  schema = true
  twitter_cards = true

  customCSS = ["/css/custom.css"]

  # 站点级默认分享图（og:image / twitter:image / Article schema image 的兜底）
  images = ["/images/og-default.jpg"]

  # Cloudflare Worker that verifies Stripe sessions and signs PDF download URLs.
  # After running `wrangler deploy` in worker/, update this to your workers.dev URL
  # (or your custom subdomain like https://api.coffeeprism.com).
  fulfillmentWorkerUrl = "https://coffeeprism-fulfillment.ikow233.workers.dev"

  # ConvertKit email capture (tag-based subscription)
  convertKitApiKey = "xq6f1Lkl52EuZgWihSR3Mw"
  convertKitTagId = "20668699"

  # AdSense — 客户端 ID 已嵌在 baseof.html 里启用 Auto Ads。
  # 下面的 slot 是"文章内"手动广告单元（In-article ad）—— 比 Auto Ad
  # 的 RPM 高 30-50%，因为位置可控（紧贴正文中段）。
  # 启用步骤：
  #   1. AdSense Dashboard → Ads → By ad unit → Create new In-article ad
  #   2. 拿到 data-ad-slot 数字（如 "1234567890"）
  #   3. 把这里的占位 "" 改成那串数字
  # 留空字符串则该位置不渲染广告（默认禁用，安全保底）。
  adsenseClient = "ca-pub-2507974090472113"
  adsenseInArticleSlot = ""

  [Params.style.vars]

  [Params.logo]
    title = "Coffee Prism"
    subtitle = "您的咖啡专业指南"

  [Params.thumbnail]
    visibility = ["list", "post"]

  [Params.sidebar]
    # 全站无 sidebar：首页用 hero + pillar 卡片 + book 卡片代替；
    # 文章/pillar 页用 sticky TOC 代替；分类页用 card grid。
    home = false
    list = false
    single = false
    widgets = ["search", "recent", "categories", "social"]

  [Params.widgets]
    recent_num = 5
    categories_counter = true
    tags_counter = true

  [Params.widgets.social]

# ============ 多语言 ============
# zh-cn 是默认语言（URL 不带前缀，全部现有 URL 不变）；
# en 是 Phase 1 试点（/en/ 前缀，11 个编辑级翻译页面）。
# 菜单按语言分开定义，避免英文页面显示中文导航。
[languages]

[languages.zh-cn]
languageCode = "zh-cn"
languageName = "中文"
weight = 1

# 主导航按用户「意图」排，5 项不杂
[[languages.zh-cn.menu.main]]
identifier = "brewing-methods"
name = "冲煮方法"
url = "/brewing-methods/"
weight = 10

[[languages.zh-cn.menu.main]]
identifier = "coffee-beans"
name = "咖啡豆"
url = "/coffee-beans/"
weight = 20

[[languages.zh-cn.menu.main]]
identifier = "coffee-equipment"
name = "咖啡器具"
url = "/coffee-equipment/"
weight = 30

[[languages.zh-cn.menu.main]]
identifier = "health"
name = "咖啡与健康"
url = "/health/"
weight = 40

[[languages.zh-cn.menu.main]]
identifier = "guides"
name = "📘 电子书"
url = "/guide/comprehensive/"
weight = 50

# 把次要入口放底部菜单（footer 渲染），保留可访问性但不挤占主导航
[[languages.zh-cn.menu.footer]]
identifier = "trending"
name = "热点分析"
url = "/categories/咖啡热点分析/"
weight = 10

[[languages.zh-cn.menu.footer]]
identifier = "categories"
name = "全部分类"
url = "/categories/"
weight = 20

[[languages.zh-cn.menu.footer]]
identifier = "tags"
name = "标签"
url = "/tags/"
weight = 30

[[languages.zh-cn.menu.footer]]
identifier = "about"
name = "关于我们"
url = "/about/"
weight = 40

[[languages.zh-cn.menu.footer]]
identifier = "english"
name = "English"
url = "/en/"
weight = 60

[[languages.zh-cn.menu.footer]]
identifier = "contact"
name = "联系我们"
url = "/contact/"
weight = 70

[languages.en]
languageCode = "en"
languageName = "English"
weight = 2
title = "Coffee Prism"

[languages.en.params]
description = "Science-based coffee brewing guides: pour-over, espresso, French press, AeroPress, beans, gear and health — with reproducible parameters."

[languages.en.params.logo]
title = "Coffee Prism"
subtitle = "Brew better coffee, backed by science"

[[languages.en.menu.main]]
identifier = "brewing-methods"
name = "Brewing"
url = "/en/brewing-methods/"
weight = 10

[[languages.en.menu.main]]
identifier = "coffee-beans"
name = "Beans"
url = "/en/coffee-beans/"
weight = 20

[[languages.en.menu.main]]
identifier = "coffee-equipment"
name = "Gear"
url = "/en/coffee-equipment/"
weight = 30

[[languages.en.menu.main]]
identifier = "health"
name = "Coffee & Health"
url = "/en/health/"
weight = 40

[[languages.en.menu.footer]]
identifier = "about"
name = "About"
url = "/en/about/"
weight = 10

[[languages.en.menu.footer]]
identifier = "chinese"
name = "中文版"
url = "/"
