name: 自动文章生成与发布

on:
  # 2026-05-04 恢复：generator 已加 4 道质量门槛（XML 输出 / 字数重试 /
  # 主题去重 / pillar 链接），不会再批量产出薄内容。
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 安装Python依赖
        run: pip install -r requirements.txt

      - name: 设置Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: 配置Git
        run: |
          git config --global user.name "自动发布机器人"
          git config --global user.email "autobot@coffeeprism.com"

      - name: 生成文章
        env:
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
        run: python scripts/generate_and_publish.py

      - name: 构建网站
        run: hugo --minify --themesDir ./themes

      - name: 提交并推送到main分支
        run: |
          git add content
          git add -f public

          if [[ -z $(git status -s) ]]; then
            echo "没有需要提交的更改"
            exit 0
          fi

          git commit -m "自动发布: 添加新文章 - $(date +%Y-%m-%d)"
          git push origin main

      - name: 上传页面工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-and-build
    steps:
      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    # deploy 成功后把 sitemap 全量 URL 推给 IndexNow（Bing/Copilot 等）。
    # Bing 索引喂 Copilot、DeepSeek 候选集、豆包全网搜索 —— 即时推送比
    # 等爬虫快几天到几周。失败不影响发布（continue-on-error）。
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: IndexNow 提交
        run: |
          sleep 60  # 等 Pages CDN 生效，确保 key 文件可被 IndexNow 验证
          python3 scripts/indexnow_submit.py
