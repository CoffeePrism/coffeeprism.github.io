{{ define "main" }}
<main class="main list" role="main">
	{{- if .Title }}
	<header class="main__header">
		<h1 class="main__title">{{ .Title }}</h1>
		{{- with .Description }}
		<p class="main__subtitle">{{ . }}</p>
		{{- end }}
	</header>
	{{- end }}
	{{- with .Content }}
	<div class="content main__content clearfix">
		{{ . }}
	</div>
	{{- end }}
	<div class="card-grid">
	{{- range .Paginator.Pages }}
		{{- .Render "summary" }}
	{{- end }}
	</div>
</main>
{{ partial "pagination.html" . }}
{{ end }}
