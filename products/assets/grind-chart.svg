<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, 'PingFang SC', sans-serif">
  <defs>
    <radialGradient id="bean" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#8b6f47"/>
      <stop offset="100%" stop-color="#3d2817"/>
    </radialGradient>
  </defs>

  <rect width="800" height="360" fill="#faf7f2"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#3d2817">研磨度对照图</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#8b6f47">Grind Size Reference</text>

  <!-- 极粗 -->
  <g transform="translate(80,120)">
    <circle cx="0" cy="0" r="22" fill="url(#bean)"/>
    <circle cx="18" cy="12" r="20" fill="url(#bean)" opacity="0.9"/>
    <circle cx="-15" cy="15" r="19" fill="url(#bean)" opacity="0.9"/>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#3d2817">极粗</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b4423">Coarse · 1.0mm+</text>
    <text x="0" y="120" text-anchor="middle" font-size="10" fill="#8b6f47">法压壶 · 冷萃</text>
  </g>

  <!-- 粗 -->
  <g transform="translate(220,120)">
    <circle cx="-10" cy="-8" r="15" fill="url(#bean)"/>
    <circle cx="12" cy="-5" r="14" fill="url(#bean)" opacity="0.95"/>
    <circle cx="-8" cy="12" r="13" fill="url(#bean)" opacity="0.9"/>
    <circle cx="10" cy="15" r="14" fill="url(#bean)" opacity="0.92"/>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#3d2817">粗</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b4423">Medium-Coarse · 0.8mm</text>
    <text x="0" y="120" text-anchor="middle" font-size="10" fill="#8b6f47">爱乐压 · Chemex</text>
  </g>

  <!-- 中 -->
  <g transform="translate(360,120)">
    <circle cx="-12" cy="-10" r="9" fill="url(#bean)"/>
    <circle cx="8" cy="-8" r="8" fill="url(#bean)"/>
    <circle cx="-5" cy="8" r="9" fill="url(#bean)"/>
    <circle cx="13" cy="10" r="8" fill="url(#bean)"/>
    <circle cx="0" cy="-2" r="7" fill="url(#bean)"/>
    <circle cx="-14" cy="3" r="7" fill="url(#bean)"/>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#3d2817">中</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b4423">Medium · 0.5-0.7mm</text>
    <text x="0" y="120" text-anchor="middle" font-size="10" fill="#8b6f47">手冲 V60 · Kalita</text>
  </g>

  <!-- 中细 -->
  <g transform="translate(500,120)">
    <g>
      <circle cx="-15" cy="-13" r="5" fill="url(#bean)"/>
      <circle cx="-5" cy="-15" r="5" fill="url(#bean)"/>
      <circle cx="5" cy="-13" r="5" fill="url(#bean)"/>
      <circle cx="-13" cy="-3" r="5" fill="url(#bean)"/>
      <circle cx="-3" cy="-4" r="5" fill="url(#bean)"/>
      <circle cx="7" cy="-3" r="5" fill="url(#bean)"/>
      <circle cx="-10" cy="8" r="5" fill="url(#bean)"/>
      <circle cx="0" cy="8" r="5" fill="url(#bean)"/>
      <circle cx="10" cy="8" r="5" fill="url(#bean)"/>
      <circle cx="15" cy="-3" r="5" fill="url(#bean)"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#3d2817">中细</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b4423">Medium-Fine · 0.3-0.5mm</text>
    <text x="0" y="120" text-anchor="middle" font-size="10" fill="#8b6f47">摩卡壶 · Aeropress</text>
  </g>

  <!-- 细 -->
  <g transform="translate(640,120)">
    <g fill="url(#bean)">
      <!-- 网格小点模拟细粉 -->
      <circle cx="-17" cy="-16" r="2.8"/><circle cx="-10" cy="-16" r="2.8"/><circle cx="-3" cy="-16" r="2.8"/><circle cx="4" cy="-16" r="2.8"/><circle cx="11" cy="-16" r="2.8"/><circle cx="18" cy="-16" r="2.8"/>
      <circle cx="-17" cy="-9" r="2.8"/><circle cx="-10" cy="-9" r="2.8"/><circle cx="-3" cy="-9" r="2.8"/><circle cx="4" cy="-9" r="2.8"/><circle cx="11" cy="-9" r="2.8"/><circle cx="18" cy="-9" r="2.8"/>
      <circle cx="-17" cy="-2" r="2.8"/><circle cx="-10" cy="-2" r="2.8"/><circle cx="-3" cy="-2" r="2.8"/><circle cx="4" cy="-2" r="2.8"/><circle cx="11" cy="-2" r="2.8"/><circle cx="18" cy="-2" r="2.8"/>
      <circle cx="-17" cy="5" r="2.8"/><circle cx="-10" cy="5" r="2.8"/><circle cx="-3" cy="5" r="2.8"/><circle cx="4" cy="5" r="2.8"/><circle cx="11" cy="5" r="2.8"/><circle cx="18" cy="5" r="2.8"/>
      <circle cx="-17" cy="12" r="2.8"/><circle cx="-10" cy="12" r="2.8"/><circle cx="-3" cy="12" r="2.8"/><circle cx="4" cy="12" r="2.8"/><circle cx="11" cy="12" r="2.8"/><circle cx="18" cy="12" r="2.8"/>
    </g>
    <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#3d2817">细</text>
    <text x="0" y="100" text-anchor="middle" font-size="11" fill="#6b4423">Fine · 0.2-0.3mm</text>
    <text x="0" y="120" text-anchor="middle" font-size="10" fill="#8b6f47">意式浓缩 Espresso</text>
  </g>

  <!-- Axis -->
  <line x1="60" y1="270" x2="740" y2="270" stroke="#d4a574" stroke-width="2"/>
  <polygon points="740,265 750,270 740,275" fill="#d4a574"/>
  <text x="60" y="300" font-size="11" fill="#8b6f47">更慢萃取 · 较低浓度</text>
  <text x="640" y="300" font-size="11" fill="#8b6f47">更快萃取 · 较高浓度</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#8b6f47">研磨越细 → 表面积越大 → 萃取越快</text>

  <text x="400" y="335" text-anchor="middle" font-size="10" fill="#a08060" font-style="italic">Coffee Prism · findpicked.com</text>
</svg>
