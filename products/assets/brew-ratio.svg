<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, 'PingFang SC', sans-serif">
  <rect width="800" height="380" fill="#faf7f2"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#3d2817">粉水比对照</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#8b6f47">Brew Ratio Reference</text>

  <!-- Espresso 1:2 -->
  <g transform="translate(100,150)">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#6b4423" opacity="0.92"/>
    <text x="0" y="5" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">1:2</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#3d2817">意式浓缩</text>
    <text x="0" y="72" text-anchor="middle" font-size="11" fill="#6b4423">Espresso</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#8b6f47">18g 粉 → 36g 液</text>
  </g>

  <!-- Ristretto 1:1.5 -->
  <g transform="translate(240,150)">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#8b4513" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">1:1.5</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#3d2817">Ristretto</text>
    <text x="0" y="72" text-anchor="middle" font-size="11" fill="#6b4423">浓缩短萃</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#8b6f47">更浓郁</text>
  </g>

  <!-- 手冲 1:15 -->
  <g transform="translate(380,150)">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#a0522d" opacity="0.85"/>
    <text x="0" y="5" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">1:15</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#3d2817">手冲（浓）</text>
    <text x="0" y="72" text-anchor="middle" font-size="11" fill="#6b4423">Pour-over</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#8b6f47">15g 粉 → 225g 水</text>
  </g>

  <!-- 手冲 1:17 -->
  <g transform="translate(520,150)">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#b5651d" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">1:17</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#3d2817">手冲（标准）</text>
    <text x="0" y="72" text-anchor="middle" font-size="11" fill="#6b4423">SCA 推荐</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#8b6f47">15g 粉 → 255g 水</text>
  </g>

  <!-- 冷萃 1:8 浓缩 -->
  <g transform="translate(660,150)">
    <rect x="-40" y="-30" width="80" height="60" rx="8" fill="#654321" opacity="0.95"/>
    <text x="0" y="5" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">1:8</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#3d2817">冷萃浓缩</text>
    <text x="0" y="72" text-anchor="middle" font-size="11" fill="#6b4423">Cold Brew</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#8b6f47">100g 粉 → 800g 水</text>
  </g>

  <!-- Scale bar -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#d4a574" stroke-width="2"/>
  <text x="60" y="306" font-size="11" fill="#8b6f47">更浓 (High TDS)</text>
  <text x="700" y="306" font-size="11" text-anchor="end" fill="#8b6f47">更淡 (Low TDS)</text>
  <text x="400" y="306" text-anchor="middle" font-size="11" fill="#8b6f47">—— 浓度递减 ——</text>

  <!-- Legend box -->
  <g transform="translate(60, 330)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#3d2817">SCA Golden Cup 标准：</text>
    <text x="150" y="0" font-size="11" fill="#6b4423">粉水比约 1:16.5（±10%），TDS 1.15-1.35%，萃取率 18-22%</text>
  </g>

  <text x="400" y="368" text-anchor="middle" font-size="10" fill="#a08060" font-style="italic">Coffee Prism</text>
</svg>
